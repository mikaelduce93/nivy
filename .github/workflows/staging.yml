name: Staging Validation

on:
  workflow_dispatch: # Déclenchement manuel
  push:
    branches: [develop] # Après déploiement sur develop
  deployment_status: # Après déploiement Vercel staging

env:
  NODE_VERSION: '20'

jobs:
  staging-health-checks:
    name: Staging Health Checks
    runs-on: ubuntu-latest
    environment:
      name: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run staging health checks
        run: npm run test:staging
        env:
          NEXT_PUBLIC_STAGING_URL: ${{ secrets.STAGING_URL || vars.STAGING_URL }}
          NEXT_PUBLIC_PROD_URL: ${{ secrets.PROD_URL || vars.PROD_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload health check report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: staging-health-report
          path: staging-health-report.json
          retention-days: 7

      - name: Comment on PR (if PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let report = '## ✅ Staging Health Checks\n\n';
            
            try {
              const data = fs.readFileSync('staging-health-report.json', 'utf8');
              const health = JSON.parse(data);
              
              const statusEmoji = {
                healthy: '✅',
                degraded: '⚠️',
                unhealthy: '❌',
              };
              
              report += `${statusEmoji[health.overall]} **Status:** ${health.overall.toUpperCase()}\n\n`;
              report += `**Summary:**\n`;
              report += `- Total: ${health.summary.total}\n`;
              report += `- Passed: ${health.summary.passed}\n`;
              report += `- Failed: ${health.summary.failed}\n`;
              report += `- Warnings: ${health.summary.warnings}\n\n`;
              
              report += `**Checks:**\n`;
              health.checks.forEach(check => {
                const emoji = check.status === 'pass' ? '✅' : check.status === 'fail' ? '❌' : '⚠️';
                report += `${emoji} ${check.name}: ${check.message}\n`;
              });
            } catch (error) {
              report += '❌ Error generating report';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            // Optionnel: Envoyer notification Slack/Email
            console.log('Staging health checks failed - notification should be sent');

